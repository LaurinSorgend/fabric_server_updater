name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Lint (ruff check)
        run: ruff check --target-version py310 --exclude .venv,.claude,backups .

      - name: Format check (ruff format)
        run: ruff format --check --target-version py310 --exclude .venv,.claude,backups .

      - name: Syntax check
        run: python -m compileall -q .
